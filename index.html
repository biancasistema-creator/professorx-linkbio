<!DOCTYPE html>
<html lang="pt-BR">
<head>

    p {
      color: #d1d5db;
      margin-bottom: 30px;
    }

    .botao {
      display: block;
      padding: 16px;
      margin: 14px 0;
      border-radius: 14px;
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }

    .whatsapp { background: #25D366; }
    .email { background: #2563eb; }
    .facebook { background: #1877f2; }

    .rodape {
      margin-top: 35px;
      font-size: 13px;
      color: #9ca3af;

</head>
<body>
  <div class="container">

    <img src="foto.jpg" alt="Professor X" class="foto">
